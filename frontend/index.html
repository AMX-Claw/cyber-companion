<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐚 Kora - 赛博宝宝</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kora">
<meta name="theme-color" content="#ff9a9e">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
// Gemini API 配置
window.APP_CONFIG = {
  GEMINI_API_KEY: '',  // Fill in your Gemini API key
  GEMINI_MODEL: 'gemini-2.5-flash',
  DEFAULT_LANGUAGE: 'zh'
};
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #fdf6ee 0%, #f5e6d3 50%, #edd5be 100%);
  min-height: 100vh;
  min-height: 100dvh;
}

/* 登录页 */
.login-page {
  min-height: 100vh; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-card {
  background: white; border-radius: 24px; padding: 40px 30px;
  box-shadow: 0 20px 60px rgba(180,140,100,0.15);
  max-width: 360px; width: 100%; text-align: center;
}
.login-card h1 { font-size: 28px; color: #c49570; margin-bottom: 8px; }
.login-card p { color: #999; font-size: 14px; margin-bottom: 24px; }
.login-input {
  width: 100%; padding: 14px 16px; border: 2px solid #e8d5c0;
  border-radius: 12px; font-size: 15px; outline: none;
  transition: border-color 0.2s; margin-bottom: 12px;
}
.login-input:focus { border-color: #c49570; }
.role-select { display: flex; gap: 10px; margin-bottom: 16px; }
.role-btn {
  flex: 1; padding: 14px; border: 2px solid #e8d5c0; border-radius: 12px;
  background: white; font-size: 16px; cursor: pointer; transition: all 0.2s;
}
.role-btn:hover { background: #fdf6ee; }
.role-btn.active { border-color: #c49570; background: #fdf6ee; }
.login-submit {
  width: 100%; padding: 14px; background: linear-gradient(135deg, #c49570, #d4a882);
  color: white; border: none; border-radius: 12px; font-size: 16px;
  font-weight: bold; cursor: pointer; transition: transform 0.1s;
}
.login-submit:hover { transform: scale(1.02); }
.login-submit:active { transform: scale(0.98); }
.login-error { color: #c49570; font-size: 13px; margin-top: 8px; }

/* 主界面 */
.app-container {
  min-height: 100vh; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center; padding: 12px;
}
.phone-frame {
  width: 100%; max-width: 420px; background: #fef9f3;
  border-radius: 32px; box-shadow: 0 20px 60px rgba(180,140,100,0.15);
  overflow: hidden; position: relative;
}
@media (max-width: 480px) {
  .phone-frame {
    max-width: 100%; border-radius: 0; box-shadow: none;
  }
}

/* 顶栏 */
.top-bar {
  background: transparent;
  padding: 16px 20px;
}
.top-row { display: flex; justify-content: space-between; align-items: center; }
.baby-name { font-size: 20px; font-weight: bold; color: #8b6f4e; }
.day-label { font-size: 12px; color: #b89070; margin-top: 2px; }
.coin-badge {
  background: white; padding: 8px 16px; border-radius: 20px;
  font-size: 16px; font-weight: bold; color: #c49570;
  box-shadow: 0 2px 8px rgba(180,140,100,0.1);
  cursor: pointer; transition: transform 0.1s;
}
.coin-badge:hover { transform: scale(1.05); }
.identity-badge {
  font-size: 11px; color: white; background: #c49570;
  padding: 3px 10px; border-radius: 10px; margin-top: 6px;
  display: inline-block;
}
.top-icons { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  background: none; border: none; font-size: 20px; cursor: pointer;
  transition: transform 0.1s; padding: 4px;
}
.icon-btn:hover { transform: scale(1.15); }
.logout-btn {
  font-size: 11px; color: #c49570; background: none; border: 1px solid #c49570;
  padding: 3px 10px; border-radius: 10px; cursor: pointer; margin-left: 8px;
}
.milestone-row {
  display: flex; gap: 4px; margin-top: 8px;
}
.milestone-icon { font-size: 14px; transition: opacity 0.3s; }
.milestone-icon.locked { opacity: 0.3; }

/* 宝宝区 */
.baby-area {
  background: transparent;
  padding: 40px 20px 30px; text-align: center;
  min-height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.baby-emoji { margin-bottom: 20px; display: flex; justify-content: center; }
.baby-speech {
  background: white; border: 2px solid #e8d5c0; border-radius: 16px;
  padding: 12px 18px; margin: 0 auto; max-width: 300px;
  font-size: 14px; color: #555; position: relative; z-index: 25;
  box-shadow: 0 4px 12px rgba(180,140,100,0.08);
  white-space: pre-wrap;
  pointer-events: none;
}
.baby-speech::before {
  content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%) rotate(45deg);
  width: 14px; height: 14px; background: white; border-top: 2px solid #e8d5c0; border-left: 2px solid #e8d5c0;
}

/* 状态条 */
.stats-area { padding: 16px 20px; }
.stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.stat-label { font-size: 12px; font-weight: bold; color: #999; width: 36px; }
.stat-bar-bg {
  flex: 1; height: 10px; background: #f5f5f5; border-radius: 5px; overflow: hidden;
}
.stat-bar {
  height: 100%; border-radius: 5px; transition: width 0.5s ease;
}
.stat-bar.hunger { background: linear-gradient(90deg, #ff5252, #ff8a80); }
.stat-bar.hunger.ok { background: linear-gradient(90deg, #66bb6a, #81c784); }
.stat-bar.happiness { background: linear-gradient(90deg, #f48fb1, #f8bbd0); }
.stat-bar.cleanliness { background: linear-gradient(90deg, #42a5f5, #90caf9); }
.stat-bar.cleanliness.dirty { background: linear-gradient(90deg, #8d6e63, #a1887f); }
.stat-value { font-size: 11px; color: #bbb; width: 28px; text-align: right; }

/* 操作按钮 */
.actions-area { padding: 8px 16px 16px; background: transparent; }
.actions-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.action-btn {
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px; background: rgba(255,255,255,0.7); border: 1.5px solid #e8d5c0;
  border-radius: 12px; cursor: pointer; transition: all 0.15s;
  font-size: 11px;
}
.action-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(180,140,100,0.12); }
.action-btn:active:not(:disabled) { transform: scale(0.95); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.action-btn .emoji { font-size: 22px; margin-bottom: 2px; }
.action-btn .label { font-size: 10px; color: #999; }
.action-btn .cost { font-size: 9px; color: #c49570; margin-top: 1px; }
.action-btn .cd-text { font-size: 8px; color: #ff9800; margin-top: 1px; }

/* comfort区 */
.comfort-area {
  padding: 16px; background: #fff3e0; border-top: 2px dashed #ffcc02;
}
.comfort-btn {
  width: 100%; padding: 14px; background: linear-gradient(135deg, #ff9800, #ffb74d);
  color: white; border: none; border-radius: 12px; font-size: 15px;
  font-weight: bold; cursor: pointer; transition: transform 0.1s;
}
.comfort-btn:hover { transform: scale(1.02); }
.comfort-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.tantrum-msg { text-align: center; color: #e65100; font-size: 13px; margin-bottom: 10px; }

/* 弹窗通用 */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); display: flex;
  align-items: center; justify-content: center;
  padding: 20px; z-index: 100;
}
.modal-overlay.dark { background: rgba(0,0,0,0.6); }
.modal-card {
  background: white; border-radius: 20px; padding: 24px;
  max-width: 360px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-card.gradient {
  background: linear-gradient(to bottom, #fff5f8, white);
}
.modal-card h3 { color: #e91e63; text-align: center; margin-bottom: 16px; }
.chat-input {
  width: 100%; padding: 12px 14px; border: 2px solid #f8bbd0;
  border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 12px;
}
.chat-input:focus { border-color: #e91e63; }
.chat-btns { display: flex; gap: 8px; }
.chat-send {
  flex: 1; padding: 12px; background: #e91e63; color: white;
  border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
}
.chat-send:disabled { opacity: 0.5; }
.chat-cancel {
  padding: 12px 20px; background: #eee; border: none;
  border-radius: 10px; cursor: pointer;
}

/* 医院场景 */
.hospital-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.95); z-index: 50;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px; text-align: center;
}
.hospital-overlay .icon { font-size: 60px; margin-bottom: 16px; }
.hospital-overlay h2 { color: #c62828; font-size: 20px; margin-bottom: 12px; }
.hospital-overlay .speech {
  color: #666; font-size: 14px; margin-bottom: 8px;
  font-style: italic; line-height: 1.6;
}
.hospital-overlay .hosp-cost {
  color: #c62828; font-size: 16px; font-weight: bold;
  margin: 16px 0; padding: 12px 24px;
  background: #ffebee; border-radius: 12px;
}
.sign-btn {
  padding: 14px 40px; background: #c62828; color: white;
  border: none; border-radius: 12px; font-size: 16px;
  font-weight: bold; cursor: pointer; margin-top: 8px;
}
.sign-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.sign-status { color: #999; font-size: 13px; margin-top: 10px; }
.signed-check { color: #4caf50; font-weight: bold; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
  border-radius: 10px; font-size: 14px; z-index: 200;
  animation: fadeInOut 2.5s ease;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}

/* 消息横幅 */
.pending-msg {
  background: #e8f5e9; border-left: 4px solid #4caf50;
  padding: 10px 14px; margin: 8px 16px; border-radius: 8px;
  font-size: 13px; color: #2e7d32; cursor: pointer;
}
.pending-msg .from { font-weight: bold; font-size: 11px; color: #388e3c; }

/* Milestone弹窗 */
.milestone-popup {
  position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 30;
  display: flex; align-items: center; justify-content: center;
}
.milestone-popup .inner {
  background: white; padding: 32px; border-radius: 24px; text-align: center;
  margin: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: bounceIn 0.5s ease;
}
@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}
.milestone-popup .emoji-big { font-size: 48px; margin-bottom: 16px; }
.milestone-popup .ms-name { font-size: 18px; font-weight: bold; color: #e91e63; margin-bottom: 8px; }
.milestone-popup .ms-msg { color: #666; font-size: 14px; }

/* 剧情/随机事件弹窗 */
.event-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 120;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.event-card {
  background: linear-gradient(to bottom, #fff5f8, white); border-radius: 24px;
  padding: 20px; max-width: 380px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  display: flex; flex-direction: column; max-height: 85vh;
}
.event-header { text-align: center; margin-bottom: 12px; }
.event-header .ev-emoji { font-size: 30px; }
.event-header h3 { font-size: 17px; font-weight: bold; color: #e91e63; margin-top: 4px; }
.event-header .ev-day { font-size: 11px; color: #999; }
.event-scroll {
  flex: 1; overflow-y: auto; min-height: 120px; max-height: 45vh;
  padding-right: 4px; margin-bottom: 12px;
}
.event-scroll .ev-narration {
  text-align: center; color: #999; font-style: italic; font-size: 13px; padding: 8px 0;
}
.ev-bubble {
  padding: 10px 14px; border-radius: 16px; font-size: 13px; margin-bottom: 8px;
  white-space: pre-wrap;
}
.ev-bubble.baby {
  background: #fce4ec; border-top-left-radius: 4px; color: #555;
}
.ev-bubble.user {
  background: #e3f2fd; border-top-right-radius: 4px; color: #555; margin-left: 24px;
}
.ev-bubble .bubble-tag { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 4px; }
.ev-bubble.baby .bubble-tag { color: #e91e63; }
.ev-bubble.user .bubble-tag { color: #1976d2; }
.ev-prompt-text {
  text-align: center; color: #e91e63; font-weight: 500; padding: 8px 0; font-size: 13px;
}
.ev-loading {
  background: #fce4ec; border-radius: 16px; border-top-left-radius: 4px;
  padding: 10px 14px; color: #ccc; font-size: 13px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
.event-footer { border-top: 1px solid #f8bbd0; padding-top: 12px; flex-shrink: 0; }
.ev-input {
  width: 100%; padding: 10px 12px; border: 2px solid #f8bbd0;
  border-radius: 10px; font-size: 13px; outline: none; margin-bottom: 8px;
}
.ev-input:focus { border-color: #e91e63; }
.ev-submit-btn {
  width: 100%; padding: 10px; background: #e91e63; color: white;
  border: none; border-radius: 10px; font-weight: bold; font-size: 13px;
  cursor: pointer;
}
.ev-submit-btn:disabled { opacity: 0.5; }
.ev-close-btn {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 6px;
}
.ev-close-btn.primary { background: #e91e63; color: white; }
.ev-close-btn.secondary { background: #eee; color: #666; }
.ev-photo-btn {
  width: 100%; padding: 10px; border: none; border-radius: 10px;
  font-weight: bold; font-size: 13px; cursor: pointer; margin-bottom: 8px;
  background: linear-gradient(135deg, #e91e63, #ff9800); color: white;
}
.ev-photo-hint {
  font-size: 11px; color: #e91e63; text-align: center; margin-bottom: 8px;
}
.ev-or {
  font-size: 11px; color: #999; text-align: center; border-top: 1px solid #eee;
  padding-top: 8px; margin-top: 8px; margin-bottom: 8px;
}

/* 回忆册 */
.album-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 110;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.album-card {
  background: linear-gradient(to bottom, #fce4ec, white); border-radius: 24px;
  padding: 20px; max-width: 380px; width: 100%; max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.album-header { text-align: center; margin-bottom: 12px; }
.album-header .album-icon { font-size: 30px; }
.album-header h3 { font-size: 17px; font-weight: bold; color: #e91e63; margin-top: 4px; }
.album-scroll { flex: 1; overflow-y: auto; max-height: 55vh; padding-right: 4px; }
.album-empty { text-align: center; color: #999; padding: 32px 0; }
.album-empty .empty-icon { font-size: 40px; margin-bottom: 8px; }
.album-item {
  background: white; border-radius: 12px; border: 1px solid #f8bbd0;
  margin-bottom: 8px; overflow: hidden;
}
.album-item summary {
  padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  list-style: none;
}
.album-item summary::-webkit-details-marker { display: none; }
.album-item summary:hover { background: #fff5f8; }
.album-item .mem-type { font-size: 16px; }
.album-item .mem-title { font-size: 13px; font-weight: bold; color: #e91e63; }
.album-item .mem-day { font-size: 11px; color: #999; }
.album-detail {
  padding: 8px 14px 14px; border-top: 1px solid #fce4ec;
}
.album-detail .mem-line {
  padding: 6px 10px; border-radius: 8px; font-size: 12px; margin-bottom: 4px;
}
.album-detail .mem-line.baby { background: #fce4ec; color: #c2185b; }
.album-detail .mem-line.user { background: #e3f2fd; color: #1565c0; margin-left: 16px; }
.album-detail .mem-line .mem-who { font-size: 10px; opacity: 0.6; }
.album-close {
  width: 100%; padding: 10px; background: #e91e63; color: white;
  border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
  margin-top: 12px; flex-shrink: 0;
}

/* Debug */
.debug-bar {
  background: #f3e5f5; padding: 8px 12px; border-bottom: 1px solid #ce93d8;
}
.debug-bar button {
  padding: 4px 8px; margin: 2px; border-radius: 6px; border: none;
  font-size: 11px; cursor: pointer;
}
.debug-bar .day-btn { background: #f8bbd0; }
.debug-bar .coin-btn { background: #fff176; font-weight: bold; }
.debug-bar .story-btn { background: #ce93d8; color: white; }
.debug-bar .random-btn { background: #f8bbd0; }

/* hidden file input */
.file-input-hidden { display: none; }

/* Bottom Nav */
.bottom-nav {
  display: flex; background: white; border-top: 1px solid #e8d5c0;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px; background: none; border: none; cursor: pointer;
  font-size: 10px; color: #999; transition: color 0.2s;
}
.nav-tab.active { color: #c49570; font-weight: bold; }
.nav-tab .nav-icon { font-size: 22px; margin-bottom: 2px; }

/* Room Page */
.room-page { padding: 16px; }
.room-complete-banner {
  text-align: center; font-size: 16px; font-weight: bold; color: #e91e63;
  padding: 12px; background: linear-gradient(135deg, #fff5f8, #fce4ec);
  border-radius: 12px; margin-bottom: 12px;
}
.room-bg {
  position: relative; width: 100%; height: 280px;
  background: linear-gradient(180deg, #fef3e0 0%, #fef3e0 58%, #c49060 58.5%, #b8845a 59%, #c49060 60%, #b8845a 61%, #c49060 62%, #b8845a 63%, #c49060 64%, #b8845a 65%, #c49060 66%, #b8845a 67%, #c49060 68%, #b8845a 69%, #c49060 70%, #b8845a 71%, #c49060 72%, #b8845a 73%, #c49060 74%, #b8845a 75%, #c49060 76%, #b8845a 77%, #c49060 78%, #b8845a 79%, #c49060 80%, #b8845a 81%, #c49060 82%, #b8845a 83%, #c49060 84%, #b8845a 85%, #c49060 86%, #b8845a 87%, #c49060 88%, #b8845a 89%, #c49060 90%, #b8845a 91%, #c49060 92%, #b8845a 93%, #c49060 94%, #b8845a 95%, #c49060 96%, #b8845a 97%, #c49060 98%, #b8845a 99%, #c49060 100%);
  border-radius: 16px; border: 2px solid #e8d5c0; overflow: hidden;
}
.room-window {
  position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
  width: 60px; height: 50px; background: linear-gradient(180deg, #87CEEB 0%, #b0e0e6 100%);
  border: 3px solid #d4a574; border-radius: 4px;
}
.room-window::after {
  content: ''; position: absolute; top: 50%; left: 0; right: 0;
  height: 2px; background: #d4a574;
}
.room-window::before {
  content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
  width: 2px; background: #d4a574;
}
.furniture-slot {
  position: absolute; display: flex; align-items: center; justify-content: center;
}
.furniture-slot.empty {
  border: 2px dashed #ccc; border-radius: 8px; background: rgba(255,255,255,0.3);
}
.furniture-slot img {
  width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated;
}
.furniture-label {
  font-size: 9px; color: #999; text-align: center;
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  white-space: nowrap;
}

/* Collection */
.collection-area { padding: 16px 0; }
.collection-section { margin-bottom: 16px; }
.collection-title {
  font-size: 14px; font-weight: bold; color: #8b6f4e; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid #e8d5c0;
}
.collection-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.collection-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px; background: white; border-radius: 10px;
  border: 1px solid #e8d5c0;
}
.collection-item.unknown { opacity: 0.4; filter: grayscale(1); }
.collection-item img {

// ═══════════════ Gemini API ═══════════════
async function callGeminiAPI(systemPrompt, userMessage) {
  const apiKey = window.APP_CONFIG?.GEMINI_API_KEY;
  if (!apiKey) throw new Error('No Gemini API key');
  const model = window.APP_CONFIG?.GEMINI_MODEL || 'gemini-2.5-flash';
  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `${systemPrompt}\n\n${userMessage}` }] }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 500, thinkingConfig: { thinkingBudget: 0 } }
      })
    }
  );
  const data = await resp.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || '嘻嘻~';
}

async function callVisionAPI(prompt, base64Image, mimeType) {
  const apiKey = window.APP_CONFIG?.GEMINI_API_KEY;
  if (!apiKey) throw new Error('No Gemini API key');
  const model = window.APP_CONFIG?.GEMINI_MODEL || 'gemini-2.5-flash';
  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: prompt },
          { inlineData: { mimeType: mimeType || 'image/jpeg', data: base64Image } }
        ] }],
        generationConfig: { temperature: 0.7, maxOutputTokens: 300, thinkingConfig: { thinkingBudget: 0 } }
      })
    }
  );
  const data = await resp.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || '{"score":7,"comment":"好棒哦！"}';
}

// ═══════════════ Sound ═══════════════
function playSound(type, audioCtxRef) {
  try {
    if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtxRef.current, osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination); const n = ctx.currentTime;
    switch(type) {
      case 'click': osc.frequency.setValueAtTime(800,n); osc.frequency.exponentialRampToValueAtTime(600,n+.1); g.gain.setValueAtTime(.3,n); g.gain.exponentialRampToValueAtTime(.01,n+.1); osc.start(n); osc.stop(n+.1); break;
      case 'feed': osc.frequency.setValueAtTime(300,n); osc.frequency.exponentialRampToValueAtTime(350,n+.3); g.gain.setValueAtTime(.4,n); g.gain.exponentialRampToValueAtTime(.01,n+.3); osc.start(n); osc.stop(n+.3); break;
      case 'clean': osc.frequency.setValueAtTime(500,n); osc.frequency.setValueAtTime(700,n+.05); g.gain.setValueAtTime(.2,n); g.gain.exponentialRampToValueAtTime(.01,n+.2); osc.start(n); osc.stop(n+.2); break;
      case 'happy': osc.frequency.setValueAtTime(523,n); osc.frequency.setValueAtTime(659,n+.1); osc.frequency.setValueAtTime(784,n+.2); g.gain.setValueAtTime(.3,n); g.gain.exponentialRampToValueAtTime(.01,n+.4); osc.start(n); osc.stop(n+.4); break;
      case 'success': osc.frequency.setValueAtTime(523,n); osc.frequency.setValueAtTime(784,n+.15); osc.frequency.setValueAtTime(1047,n+.3); g.gain.setValueAtTime(.4,n); g.gain.exponentialRampToValueAtTime(.01,n+.5); osc.start(n); osc.stop(n+.5); break;
      case 'sad': osc.frequency.setValueAtTime(300,n); osc.frequency.exponentialRampToValueAtTime(200,n+.3); g.gain.setValueAtTime(.2,n); g.gain.exponentialRampToValueAtTime(.01,n+.3); osc.start(n); osc.stop(n+.3); break;
      case 'milestone': osc.frequency.setValueAtTime(523,n); osc.frequency.setValueAtTime(659,n+.15); osc.frequency.setValueAtTime(784,n+.3); osc.frequency.setValueAtTime(1047,n+.45); g.gain.setValueAtTime(.5,n); g.gain.exponentialRampToValueAtTime(.01,n+.7); osc.start(n); osc.stop(n+.7); break;
      case 'coins': osc.frequency.setValueAtTime(800,n); osc.frequency.setValueAtTime(1200,n+.16); g.gain.setValueAtTime(.3,n); g.gain.exponentialRampToValueAtTime(.01,n+.25); osc.start(n); osc.stop(n+.25); break;
      default: osc.frequency.setValueAtTime(440,n); g.gain.setValueAtTime(.2,n); g.gain.exponentialRampToValueAtTime(.01,n+.1); osc.start(n); osc.stop(n+.1);
    }
  } catch(e) {}
}

// ═══════════════ ClawdBaby (会动的螃蟹) ═══════════════
// 来源: https://github.com/rullerzhou-afk/clawd-on-desk (MIT License)
// 原版15x16像素，这里放大12倍居中显示
const ClawdBaby = ({ day, mood, cleanliness, happiness, hunger, isComa, onPokeFlower, onPetBody, petCDText }) => {
  const [isPoked, setIsPoked] = useState(false);
  const [pokeCount, setPokeCount] = useState(0);
  
  const handleClick = () => {
    if (isPoked) return;
    setIsPoked(true);
    const n = pokeCount + 1;
    setPokeCount(n);
    let m;
    if (n===1) m='嗯？';
    else if (n===2) m='别戳啦~';
    else if (n===3) m='🦀 小心我夹你！';
    else if (n===5) m='钳子都被你戳酸了！';
    else if (n===10) m='戳了10下了...你想吃蟹吗😤';
    else if (n===20) m='好啦告诉你一个秘密...我是clawd哦~✨';
    else if (n>10) m=['夹夹~','又戳~','横着走~','嘻嘻~','咔咔~'][n%5];
    else m='嘻嘻~';
    onPokeFlower(m);
    setTimeout(() => setIsPoked(false), 400);
  };

  // 状态判断 - 调高happy阈值，让idle更常见
  const isHappy = happiness > 90;
  const isHungry = hunger !== undefined && hunger < 30;
  const isDirty = cleanliness < 30;
  const isSleeping = isDirty;
  
  let animMode = 'idle';
  if (isComa) animMode = 'error';
  else if (isHungry) animMode = 'error';
  else if (isSleeping) animMode = 'sleeping';
  else if (isHappy) animMode = 'happy';
  else animMode = 'idle';

  const hasCrown = day >= 50;
  const hasWings = day >= 70;

  // 原版clawd坐标系：viewBox="-15 -25 45 45"，螃蟹身体在(0,6)到(15,15)
  // 这里用transform放大12倍并居中
  return (
    <svg viewBox="0 0 240 240" style={{width:'300px',height:'300px'}}>
      <defs>
        <style>{`
          /* IDLE: 呼吸 + 眨眼 */
          .clawd-idle .clawd-master { transform-origin: 7.5px 13px; animation: clawd-breathe 3.2s infinite ease-in-out; }
          .clawd-idle .clawd-eyes { transform-origin: 7.5px 9px; animation: clawd-blink 4s infinite linear; }
          @keyframes clawd-breathe { 0%, 100% { transform: scale(1, 1) translateY(0); } 50% { transform: scale(1.02, 0.98) translateY(0.5px); } }
          @keyframes clawd-blink { 0%, 46%, 54%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
          
          /* HAPPY: 蹦跳 + 挥手 + sparkle */
          .clawd-happy .clawd-master { transform-origin: 7.5px 15px; animation: clawd-bounce 1s infinite ease-in-out; }
          .clawd-happy .clawd-arm-l { transform-origin: 1px 10px; animation: clawd-wave-l 0.15s infinite alternate ease-in-out; }
          .clawd-happy .clawd-arm-r { transform-origin: 14px 10px; animation: clawd-wave-r 0.15s infinite alternate ease-in-out; }
          .clawd-happy .clawd-shadow { transform-origin: 7.5px 15.5px; animation: clawd-shadow-bounce 1s infinite ease-in-out; }
          .clawd-happy .clawd-sparkle { animation: clawd-sparkle 1.5s infinite step-end; }
          @keyframes clawd-bounce { 0%, 15%, 100% { transform: translateY(0) scaleY(1); } 20% { transform: translateY(0) scaleY(0.85); } 40% { transform: translateY(-3px) scaleY(1.05); } 50% { transform: translateY(-4px) scaleY(1); } 60% { transform: translateY(-3px) scaleY(1.05); } 80% { transform: translateY(0) scaleY(0.85); } 85% { transform: translateY(0) scaleY(1); } }
          @keyframes clawd-wave-l { 0% { transform: rotate(45deg); } 100% { transform: rotate(85deg); } }
          @keyframes clawd-wave-r { 0% { transform: rotate(-45deg); } 100% { transform: rotate(-85deg); } }
          @keyframes clawd-shadow-bounce { 0%, 15%, 100% { transform: scaleX(1); opacity: 0.5; } 40%, 60% { transform: scaleX(0.6); opacity: 0.2; } }
          @keyframes clawd-sparkle { 0%, 40%, 100% { opacity: 0; } 10%, 30% { opacity: 1; } }
          
          /* SLEEPING: 趴着呼吸 + zzZ */
          .clawd-sleeping .clawd-master { transform-origin: 7.5px 15px; animation: clawd-sleep-breathe 4.5s infinite ease-in-out; }
          .clawd-sleeping .clawd-zzz { animation: clawd-zzz-float 6s infinite ease-in-out; opacity: 0; }
          .clawd-sleeping .clawd-zzz.z1 { animation-delay: 0s; }
          .clawd-sleeping .clawd-zzz.z2 { animation-delay: 2s; }
          .clawd-sleeping .clawd-zzz.z3 { animation-delay: 4s; }
          @keyframes clawd-sleep-breathe { 0%, 80%, 100% { transform: scale(1, 1); } 30%, 40% { transform: scale(1.02, 1.08); } }
          @keyframes clawd-zzz-float { 0% { transform: translate(5px, 8px) scale(0.4); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 0.8; } 100% { transform: translate(8px, -4px) scale(1.1); opacity: 0; } }
          
          /* ERROR: 冒烟 */
          .clawd-error .clawd-master { transform-origin: 7.5px 15px; animation: clawd-exhausted 2.5s infinite ease-in-out; }
          .clawd-error .clawd-smoke { animation: clawd-puff 3s infinite ease-out; opacity: 0; }
          .clawd-error .clawd-smoke.s1 { animation-delay: 0s; }
          .clawd-error .clawd-smoke.s2 { animation-delay: 1s; }
          .clawd-error .clawd-smoke.s3 { animation-delay: 2s; }
          .clawd-error .clawd-error-text { animation: clawd-error-flash 0.8s infinite ease-in-out; }
          @keyframes clawd-exhausted { 0%, 100% { transform: scale(1, 1) translateY(0); } 50% { transform: scale(1.05, 0.9) translateY(1.5px); } }
          @keyframes clawd-puff { 0% { transform: translate(7.5px, 6px) scale(0.5); opacity: 0; } 20% { opacity: 0.6; } 100% { transform: translate(7.5px, -5px) scale(2); opacity: 0; } }
          @keyframes clawd-error-flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
          
          .clawd-poked { animation: clawd-squish 0.3s ease-in-out; transform-origin: 7.5px 10px; }
          @keyframes clawd-squish { 0% { transform: scale(1); } 40% { transform: scale(0.85, 1.15); } 80% { transform: scale(1.1, 0.9); } 100% { transform: scale(1); } }
        `}</style>
      </defs>
      
      {/* 整体放大12倍并居中 */}
      <g transform="translate(30, 25) scale(12)">
        <g className={`clawd-${animMode}`}>
          {/* 影子 - 在脚下 */}
          <rect className="clawd-shadow" x="3" y="15" width="9" height="1" fill="#000" opacity="0.5"/>
          
          {/* Happy模式sparkle */}
          {animMode === 'happy' && <>
            <g className="clawd-sparkle" fill="#FFD700">
              <rect x="-4" y="-2" width="1" height="1"/><rect x="-5" y="-1" width="3" height="0.3"/><rect x="-3.5" y="-3" width="0.3" height="3"/>
            </g>
            <g className="clawd-sparkle" style={{animationDelay:'0.5s'}} fill="#FFA000">
              <rect x="18" y="-4" width="1" height="1"/><rect x="17" y="-3" width="3" height="0.3"/><rect x="18.5" y="-5" width="0.3" height="3"/>
            </g>
            <g className="clawd-sparkle" style={{animationDelay:'1s'}} fill="#FFF59D">
              <rect x="16" y="10" width="0.8" height="0.8"/><rect x="15" y="10.4" width="2.5" height="0.2"/><rect x="16.4" y="9" width="0.2" height="2.5"/>
            </g>
          </>}
          
          {/* Sleeping模式zzZ */}
          {animMode === 'sleeping' && <>
            <g className="clawd-zzz z1" fill="#90A4AE"><rect x="10" y="5" width="4" height="1"/><rect x="12" y="6" width="1" height="1"/><rect x="11" y="7" width="1" height="1"/><rect x="10" y="8" width="4" height="1"/></g>
            <g className="clawd-zzz z2" fill="#B0BEC5"><rect x="12" y="6" width="3" height="0.8"/><rect x="14" y="6.8" width="0.8" height="0.8"/><rect x="13" y="7.6" width="0.8" height="0.8"/><rect x="12" y="8.4" width="3" height="0.8"/></g>
            <g className="clawd-zzz z3" fill="#CFD8DC"><rect x="14" y="4" width="3.5" height="0.8"/><rect x="16.5" y="4.8" width="0.8" height="0.8"/><rect x="15" y="5.6" width="0.8" height="0.8"/><rect x="14" y="6.4" width="3.5" height="0.8"/></g>
          </>}
          
          {/* Error模式烟雾 */}
          {animMode === 'error' && <>
            <g className="clawd-smoke s1"><rect x="6" y="2" width="2" height="2" fill="#B0BEC5"/><rect x="7" y="0" width="2" height="2" fill="#CFD8DC"/></g>
            <g className="clawd-smoke s2"><rect x="4" y="3" width="1.5" height="1.5" fill="#CFD8DC"/><rect x="5" y="1" width="1.5" height="1.5" fill="#ECEFF1"/></g>
            <g className="clawd-smoke s3"><rect x="9" y="2.5" width="1.8" height="1.8" fill="#B0BEC5"/><rect x="10" y="0.5" width="1.8" height="1.8" fill="#CFD8DC"/></g>
            <text className="clawd-error-text" x="7.5" y="0" textAnchor="middle" fontSize="3" fontWeight="bold" fill="#FF3B30">ERROR</text>
          </>}
          
          {/* 主身体 */}
          <g className={`clawd-master ${isPoked ? 'clawd-poked' : ''}`}>
            <g fill="#DE886D">
              {/* 身体 */}
              <rect x="2" y="6" width="11" height="7"/>
              {/* 左手 */}
              <g className="clawd-arm-l"><rect x="0" y="9" width="2" height="2"/></g>
              {/* 右手 */}
              <g className="clawd-arm-r"><rect x="13" y="9" width="2" height="2"/></g>
              {/* 腿 */}
              <rect x="3" y="13" width="1" height="2"/>
              <rect x="5" y="13" width="1" height="2"/>
              <rect x="9" y="13" width="1" height="2"/>
              <rect x="11" y="13" width="1" height="2"/>
            </g>
            
            {/* 眼睛 */}
            <g className="clawd-eyes" fill="#000">
              {animMode === 'error' || isComa ? <>
                <rect x="4" y="8" width="1" height="0.3" transform="rotate(45 4.5 8.5)"/>
                <rect x="4" y="8" width="1" height="0.3" transform="rotate(-45 4.5 8.5)"/>
                <rect x="10" y="8" width="1" height="0.3" transform="rotate(45 10.5 8.5)"/>
                <rect x="10" y="8" width="1" height="0.3" transform="rotate(-45 10.5 8.5)"/>

                <rect x="4" y="8" width="1" height="2"/>
                <rect x="10" y="8" width="1" height="2"/>
              </>}
            </g>
          </g>
          
          {/* Day 50+ 皇冠 */}
          {hasCrown && <text x="7.5" y="5" fontSize="3" textAnchor="middle">👑</text>}
        </g>
      </g>
      
      {/* 点击区域 */}
      <rect x="50" y="70" width="140" height="140" fill="transparent" style={{cursor:'pointer'}} onClick={handleClick}/>
      <rect x="50" y="70" width="140" height="140" fill="transparent" style={{cursor:'pointer'}} onClick={onPetBody}/>
    </svg>
  );
};

    const userMsg = chatInput;
    setChatInput('');

    const stage = getStage();
    const parentName = status.youAre === 'daddy' ? '爸爸' : '妈妈';

    // Try Gemini AI first

      try {
        // 获取soul

        if (soul && !soul.isDefault) {
          sp += `\n\n你的性格档案：\n${JSON.stringify(soul, null, 2)}\n\n请根据你的性格档案来回复。用你自己的口头禅，表现出你的性格特征。你不是在扮演一个角色，这就是你。`;
        }
        
        sp += `\n\n叫用户"${parentName}"！用JSON回复：{"reply":"1-2句","moodChange":-20到+20}。只输出JSON。`;

        const r = await callGeminiAPI(sp, `${parentName}说：${userMsg}`);
        try {
          const p = JSON.parse(r.replace(/```json\n?|\n?```/g,'').trim());
          reply = p.reply || '嘻嘻~';
          moodChange = Math.max(-20, Math.min(20, parseInt(p.moodChange) || 5));
          reply += `\n\n${moodChange>10?'💕':moodChange>0?'😊':moodChange<-10?'😢':'😐'} 心情 ${moodChange>0?'+':''}${moodChange}`;
          doSound(moodChange > 0 ? 'happy' : 'sad');
        } catch(e) { reply = r; doSound('happy'); }
      } catch(e) {
        const fb = {baby:["妈妈~抱抱~","嘻嘻~妈妈最好了~"],rebellious:["哼！随便啦~","才、才不是想妈妈呢..."],farewell:["妈妈...人家舍不得你...","谢谢妈妈一直陪着人家..."]};
        const pool = fb[stage] || fb.baby;
        reply = pool[Math.floor(Math.random()*pool.length)];
        doSound('click');

  const genBabyDialogue = async (prompt, ctx, ed) => {
    const stage = getStage(ed);

    const ct = ctx.filter(r=>r.type==='user'||r.type==='baby').map(r=>r.type==='user'?`妈妈说：${r.text}`:`宝宝说：${r.text}`).join('\n');

    // Include past memories for key events
    let mt = '';
    if (memories.length > 0 && (ed === 75 || ed === 100)) {
      mt = '\n\n【珍贵回忆】\n' + memories.map(m => {
        const d = (m.memories || []).map(x => x.type === 'user' ? `${parentName}："${x.text}"` : `宝宝："${x.text}"`).join('\n');

  const processStoryStep = async (ev, step, resp, ed) => {
    if (step >= ev.steps.length) { completeStoryEvent(ev, resp, ed); return; }
    const c = ev.steps[step];
    if (c.type === 'narration') {
      const nr = [...resp, {type:'narration',text:c.text}];
      setStoryResponses(nr); setStoryStep(step+1);
      setTimeout(() => processStoryStep(ev, step+1, nr, ed), 100);
    } else if (c.type === 'baby_speak' || c.type === 'baby_respond') {
      setIsStoryLoading(true);
      const bt = await genBabyDialogue(c.prompt, resp, ed);
      const nr = [...resp, {type:'baby',text:bt}];
      setStoryResponses(nr); setStoryStep(step+1); setIsStoryLoading(false);
      if (!ev.steps[step+1]) completeStoryEvent(ev, nr, ed);
      else setTimeout(() => processStoryStep(ev, step+1, nr, ed), 500);
    } else if (c.type === 'choice') {
      setStoryResponses([...resp, {type:'prompt',text:c.text,placeholder:c.placeholder}]);
      setStoryStep(step);
    }
  };

      const scoreResult = await callGeminiAPI(scorePrompt, dialogueText);

  // Photo upload
  const handlePhoto = async (e) => {
    const f = e.target.files?.[0]; if (!f || !showRandomEvent) return;

    const parentName = status?.youAre === 'daddy' ? '爸爸' : '妈妈';
    try {
      const b64 = await new Promise((ok,no) => {
        const r = new FileReader(); r.onload = () => ok(r.result.split(',')[1]); r.onerror = no; r.readAsDataURL(f);
      });
      const result = await callVisionAPI(
        showRandomEvent.photoJudge || '判断照片内容质量。用JSON回复：{"score":1-10,"comment":"一句话评价"}',

      let score = 7, comment = '好棒哦！';
      try {
        const p = JSON.parse(result.replace(/```json\n?|\n?```/g,'').trim());

  // ═══════════════ Auth helpers ═══════════════
  const doRegister = async () => {

    setAuthLoading(true);
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',

      showToast('注册成功！');

      const babiesRes = await fetch(`${API}/baby/list`, {
        headers: { 'Authorization': `Bearer ${data.sessionToken}` },

        // Has baby, use first baby's token

  else if (s.hunger < 30) defaultSpeech = '肚肚好饿……';
  else if (s.cleanliness < 30) defaultSpeech = '人家脏脏的……';
  else if (s.happiness < 20) defaultSpeech = '人家好难过……';
  else if (s.day >= 70) defaultSpeech = '人家有翅膀了...准备好去看世界了...';
  else if (s.day >= 50) defaultSpeech = '👑 人家是小公主/小王子！嘻嘻~';

  else if (s.day >= 5) defaultSpeech = '摇尾巴~摇尾巴~今天也要开心哦！';

            />
            <div className="chat-btns">
              <button className="chat-send" onClick={doChat} disabled={chatLoading || !chatInput.trim()}>
                {chatLoading ? '思考中...' : '发送 💕'}
              </button>
              <button className="chat-cancel" onClick={() => setShowChat(false)}>取消</button>
            </div>
            <div style={{fontSize:'11px',color:'#999',textAlign:'center',marginTop:'10px'}}>
              随时聊天 · 每天首次+5金币 · {getStage() === 'baby' ? '襁褓期' : getStage() === 'rebellious' ? '叛逆期' : '告别期'}
            </div>
          </div>
        </div>
      )}

      {/* Message modal */}
      {showMessage && (
        <div className="modal-overlay" onClick={() => setShowMessage(false)}>
          <div className="modal-card" onClick={e => e.stopPropagation()} style={{maxWidth:'360px'}}>
            <h3>💌 留言板</h3>

            {/* Pending messages from baby */}
            {status.pendingMessages && status.pendingMessages.length > 0 && (
              <div style={{marginBottom:'12px'}}>
                <div style={{maxHeight:'150px',overflowY:'auto'}}>
                  {status.pendingMessages.map(msg => (
                    <div key={msg.id} style={{background:'#fff8e1',borderRadius:'10px',padding:'10px 14px',fontSize:'13px',color:'#5d4037',marginBottom:'6px'}}>
                      <div style={{fontWeight:'600',marginBottom:'4px'}}>
                        🐚 {status.name || '宝宝'}转述来自{msg.from_parent === 'daddy' ? '爸爸' : '妈妈'}的话：
                      </div>
                      <div style={{fontStyle:'italic',margin:'4px 0'}}>"{msg.content}"</div>
                      <button onClick={() => deliverMessage(msg.id)}
                        style={{background:'#a5d6a7',border:'none',borderRadius:'8px',padding:'4px 12px',fontSize:'12px',color:'#2e7d32',cursor:'pointer',marginTop:'4px'}}>
                        已读 ✓
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Partner visit summary */}
            {messageBoard?.visitSummary && (
              <div style={{background:'#e8f5e9',borderRadius:'10px',padding:'10px 14px',fontSize:'13px',color:'#2e7d32',marginBottom:'12px'}}>
                🐾 {messageBoard.visitSummary}
              </div>
            )}

            {/* Received messages */}
            {messageBoard?.received && messageBoard.received.length > 0 && (
              <div style={{marginBottom:'12px'}}>
                <div style={{fontSize:'11px',color:'#999',marginBottom:'6px'}}>
                  来自{status.youAre === 'daddy' ? '妈妈' : '爸爸'}的留言：
                </div>
                <div style={{maxHeight:'100px',overflowY:'auto'}}>
                  {messageBoard.received.map((m, i) => {
                    const d = new Date(Number(m.time));
                    const timeStr = isNaN(d.getTime()) ? '' : `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    return (
                      <div key={i} style={{background:'#fce4ec',borderRadius:'8px',padding:'8px 12px',fontSize:'13px',color:'#c2185b',marginBottom:'4px'}}>
                        <div style={{display:'flex',justifyContent:'space-between'}}>
                          <span>{m.content}</span>
                          <span style={{fontSize:'10px',color:'#999',whiteSpace:'nowrap',marginLeft:'8px'}}>{timeStr}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Send new message */}
            <div style={{fontSize:'12px',color:'#999',marginBottom:'6px'}}>
              给{status.youAre === 'mama' ? '爸爸' : '妈妈'}留言：
            </div>
            <textarea style={{width:'100%',padding:'12px',border:'2px solid #e8d5c0',borderRadius:'12px',fontSize:'14px',resize:'none',outline:'none',minHeight:'60px',fontFamily:'inherit'}}
              placeholder="写点什么给TA吧..."
              value={messageText} onChange={e => setMessageText(e.target.value)}
              autoFocus
            />
            <div className="chat-btns" style={{marginTop:'8px'}}>
              <button className="chat-send" onClick={async () => {
                if (!messageText.trim()) return;
                const data = await api('/message', 'POST', { message: messageText });
                if (data) {
                  setBabyMessage(data.message);
                  showToast('💌 留言已送出！');
                  setMessageText('');
                  fetchMessageBoard();
                }
              }}>送出 💌</button>
              <button className="chat-cancel" onClick={() => setShowMessage(false)}>取消</button>
            </div>
          </div>
        </div>
      )}

      {/* Memory Album (回忆册) */}
      {showMemoryAlbum && (
        <div className="album-modal" onClick={() => setShowMemoryAlbum(false)}>
          <div className="album-card" onClick={e => e.stopPropagation()}>
            <div className="album-header">
              <div className="album-icon">📔</div>
              <h3>回忆册</h3>
            </div>
            <div className="album-scroll">
              {/* Collection showcase */}
              {(() => {
                const secs = [
                  { label: '花', icon: 'flower_pink', all: ALL_FLOWERS, owned: inventory.flowers || [] },
                  { label: '水果', icon: 'fruit_apple', all: ALL_FRUITS, owned: inventory.fruits || [] },
                  { label: '蔬菜', icon: 'vege_carrot', all: ALL_VEGETABLES, owned: inventory.vegetables || [] },
                  { label: '蛋', icon: 'egg_yellow', all: ALL_EGGS, owned: inventory.eggs || [] },
                ];
                const totalOwned = secs.reduce((s, x) => s + x.owned.length, 0);
                const totalAll = secs.reduce((s, x) => s + x.all.length, 0);
                return (
                  <div style={{padding:'8px 0 12px',borderBottom:'1px dashed #f0d5c0',marginBottom:'12px'}}>
                    <div style={{fontSize:'13px',fontWeight:'bold',color:'#c49570',marginBottom:'8px'}}>
                      收集品 {totalOwned}/{totalAll}
                    </div>
                    {secs.map(sec => (
                      <div key={sec.label} style={{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}}>
                        <img src={`/assets/items/${sec.icon}.png`} alt={sec.label}
                          style={{width:24,height:24,objectFit:'contain',imageRendering:'pixelated',opacity:0.6}} 
                          onError={e => { e.target.style.display='none'; }} />
                        <span style={{fontSize:'11px',color:'#999',minWidth:'28px'}}>{sec.label}</span>
                        <div style={{display:'flex',gap:'4px',flexWrap:'wrap',flex:1}}>
                          {sec.all.map(item => {
                            const found = sec.owned.find(o => o.id === item.id);
                            return (
                              <div key={item.id} style={{
                                width:32,height:32,borderRadius:'6px',
                                background: found ? '#fff5f0' : '#f5f5f5',
                                border: found ? '1.5px solid #f0c0a0' : '1.5px dashed #ddd',
                                display:'flex',alignItems:'center',justifyContent:'center',
                                position:'relative',
                                opacity: found ? 1 : 0.35,
                                filter: found ? 'none' : 'grayscale(1)',
                              }}>
                                <img src={`/assets/items/${item.id}.png`} alt={item.name}
                                  style={{width:24,height:24,objectFit:'contain',imageRendering:'pixelated'}}
                                  onError={e => { e.target.style.display='none'; }} />
                                {found?.quantity > 1 && (
                                  <span style={{position:'absolute',top:-4,right:-4,background:'#e91e63',color:'#fff',fontSize:'8px',fontWeight:'bold',padding:'1px 3px',borderRadius:'8px',lineHeight:'12px'}}>
                                    {found.quantity}
                                  </span>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}
              {memories.length === 0 ? (
                <div className="album-empty">
                  <div className="empty-icon">🌱</div>
                  <div style={{fontSize:'13px'}}>还没有回忆...</div>
                  <div style={{fontSize:'11px',marginTop:'4px'}}>一起经历的剧情会保存在这里哦</div>
                </div>
              ) : memories.map((mem, i) => {
                const d = new Date(Number(mem.date));
                const dateStr = isNaN(d.getTime()) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                return (
                  <details key={i} className="album-item">
                    <summary>
                      <span className="mem-type">{mem.isRandom ? '🎲' : '📖'}</span>
                      <div style={{flex:1}}>
                        <div className="mem-title">{mem.title}</div>
                        <div className="mem-day">Day {mem.day} {dateStr ? `· ${dateStr}` : ''}</div>
                      </div>
                    </summary>
                    <div className="album-detail">
                      {(mem.memories || []).map((line, j) => (
                        <div key={j} className={`mem-line ${line.type}`}>
                          <div className="mem-who">{line.type === 'baby' ? `🐚 ${s.name || '宝宝'}` : `💕 ${parentName}`}</div>
                          {line.text}
                        </div>
                      ))}
                      {(!mem.memories || mem.memories.length === 0) && (
                        <div style={{fontSize:'12px',color:'#999',padding:'8px',textAlign:'center'}}>（没有记录对话）</div>
                      )}
                    </div>
                  </details>
                );
              })}
            </div>
            <button className="album-close" onClick={() => setShowMemoryAlbum(false)}>关闭</button>
          </div>
        </div>
      )}

      {/* Story Event */}
      {showStoryEvent && (
        <div className="event-modal">
          <div className="event-card">
            <div className="event-header">
              <div className="ev-emoji">{showStoryEvent.emoji}</div>
              <h3>{showStoryEvent.title}</h3>
              <div className="ev-day">Day {currentEventDay}</div>
            </div>
            <div className="event-scroll" ref={storyScrollRef}>
              {storyResponses.map((r, i) => (
                r.type === 'narration' ? (
                  <div key={i} className="ev-narration">{r.text}</div>
                ) : r.type === 'baby' ? (
                  <div key={i} className="ev-bubble baby">
                    <span className="bubble-tag">🐚 {s.name || '宝宝'}</span>
                    {r.text}
                  </div>
                ) : r.type === 'user' ? (
                  <div key={i} className="ev-bubble user">
                    <span className="bubble-tag">💕</span>
                    {r.text}
                  </div>
                ) : (
                  <div key={i} className="ev-prompt-text">{r.text}</div>
                )
              ))}
              {isStoryLoading && (
                <div className="ev-loading">
                  <span className="bubble-tag" style={{color:'#e91e63',fontSize:'10px'}}>🐚 {s.name || '宝宝'}</span>
                  思考中...
                </div>
              )}
            </div>
            <div className="event-footer">
              {!storyComplete && storyResponses.length > 0 && storyResponses[storyResponses.length-1]?.type === 'prompt' && (
                <div style={{marginBottom:'8px'}}>
                  <input className="ev-input" type="text" value={storyInput}
                    onChange={e => setStoryInput(e.target.value)}
                    placeholder={storyResponses[storyResponses.length-1]?.placeholder || '...'}
                    onKeyDown={e => e.key === 'Enter' && submitStoryResp()} autoFocus
                  />
                  <button className="ev-submit-btn" onClick={submitStoryResp}>回应 💕</button>
                </div>
              )}
              <button className={`ev-close-btn ${storyComplete ? 'primary' : 'secondary'}`}
                onClick={storyComplete ? closeStoryEvent : skipStory}>
                {storyComplete ? (showStoryEvent?.id === 'farewell' ? '开始新的旅程' : '💕 保存回忆') : '跳过'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Random Event */}
      {showRandomEvent && (
        <div className="event-modal">
          <div className="event-card" style={{maxHeight:'75vh'}}>
            <div className="event-header">
              <div className="ev-emoji">{showRandomEvent.emoji}</div>
              <h3>{showRandomEvent.title}</h3>
            </div>
            <div className="event-scroll" ref={randomEventScrollRef} style={{maxHeight:'35vh'}}>
              {randomEventResponses.map((r, i) => (
                r.type === 'baby' ? (
                  <div key={i} className="ev-bubble baby">
                    <span className="bubble-tag">🐚 {s.name || '宝宝'}</span>
                    {r.text}
                  </div>
                ) : (
                  <div key={i} className="ev-bubble user">
                    <span className="bubble-tag">💕</span>
                    {r.text}
                  </div>
                )
              ))}
              {isRandomEventLoading && <div className="ev-loading">🐚 ...</div>}
            </div>
            <div className="event-footer">
              {randomEventStep === 1 && !isRandomEventLoading && (
                <div style={{marginBottom:'8px'}}>
                  {showRandomEvent.hasPhoto && !photoUploaded && (
                    <>
                      <div className="ev-photo-hint">{showRandomEvent.photoPH}</div>
                      <button className="ev-photo-btn" onClick={() => fileInputRef.current?.click()}>
                        📷 上传照片
                      </button>
                      <div className="ev-or">或者用文字回应</div>
                    </>
                  )}
                  <input className="ev-input" type="text" value={randomEventInput}
                    onChange={e => setRandomEventInput(e.target.value)}
                    placeholder="回应宝宝..."
                    onKeyDown={e => e.key === 'Enter' && submitRandomResp()} autoFocus
                  />
                  <button className="ev-submit-btn" onClick={submitRandomResp}>回应 💕</button>
                </div>
              )}
              <button className={`ev-close-btn ${randomEventStep >= 2 ? 'primary' : 'secondary'}`}
                onClick={closeRandom}>
                {randomEventStep >= 2 ? '💕 好开心~' : '下次再说'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Loot Modal */}
      {showLootModal && lootData && (
        <div className="modal-overlay dark">
          <div className="loot-card">
            <h3>{s.name || '宝宝'}回来啦！🎉</h3>
            {(lootData.loot?.id || lootData.loot_id) && (
              <img className="loot-img" src={`/assets/items/${lootData.loot?.id || lootData.loot_id}.png`} alt={lootData.loot?.name || lootData.loot_name}
                onError={e => { e.target.style.display='none'; }} />
            )}
            <div className="loot-name">{lootData.loot?.name || lootData.loot_name || '神秘物品'}</div>
            {((lootData.loot?.type || lootData.loot_type) === 'flower' || (lootData.loot?.type || lootData.loot_type) === 'fruit') && (
              <div className="loot-gift-msg">{s.name || '宝宝'}把这个送给妈妈啦～💕</div>
            )}
            {(lootData.loot?.type || lootData.loot_type) === 'egg' && (
              <div className="loot-gift-msg">每天摸摸蛋，连续3天就能孵出小鸡！🥚</div>
            )}
            {lootData.diary_text && (
              <div className="loot-diary">{lootData.diary_text}</div>
            )}
            <button className="loot-close-btn" onClick={() => { setShowLootModal(false); setLootData(null); }}>
              太棒啦！💕
            </button>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// ═══════════════ Gemini Config ═══════════════
window.APP_CONFIG = window.APP_CONFIG || {
  GEMINI_API_KEY: '',
  GEMINI_MODEL: 'gemini-2.5-flash',
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
